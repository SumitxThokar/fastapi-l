services:
  db:
    image: postgres:16-alpine
    container_name: fastapi-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fastapiapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-fastapi_app}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fastapiapp} -d ${POSTGRES_DB:-fastapi_app}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: